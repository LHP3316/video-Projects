<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 创作控制台演示</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="hero">
        <div>
          <p class="eyebrow">FastAPI API Console</p>
          <h1>AI 创作控制台</h1>
          <p class="hero-text">
            主 Tab 为文字拆解、文生图、图生视频；文字拆解与图生视频使用系统内置提示词模板，用户只需填写正文、参数和图片。
          </p>
        </div>
        <div class="status-card">
          <span class="status-dot"></span>
          <div>
            <strong>真实接口模式</strong>
            <p>接口失败会写入 <code>backend/logs/api_calls.log</code>。</p>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="tabs main-tabs" id="mainTabs"></div>
          <div class="feature-summary hidden" id="featureSummary"></div>
          <div class="tabs model-tabs" id="modelTabs"></div>

          <form class="form-grid" id="taskForm">
            <label class="field full" id="tokenField">
              <span>Token / API Key</span>
              <input id="tokenInput" type="password" placeholder="填写当前模型的 API Token" />
            </label>

            <label class="field full" id="sourceField">
              <span id="sourceLabel">待处理文本</span>
              <textarea id="sourceInput" rows="5" placeholder="文字拆解：粘贴文案；文生图：可填写画面补充说明。"></textarea>
            </label>

            <label class="field full hidden" id="imageUploadField">
              <span>上传图片（图生视频，支持多图）</span>
              <input id="imageInput" type="file" accept="image/*" multiple />
              <small id="imageLimitTip">请选择当前模型支持的图片数量。</small>
              <div id="uploadPreview" class="preview-grid"></div>
            </label>

            <label class="field full hidden" id="promptField">
              <span id="promptLabel">提示词</span>
              <textarea id="promptInput" rows="4" placeholder="填写文生图提示词。"></textarea>
            </label>

            <div class="parameter-grid full" id="parameterGrid"></div>
            <button id="submitButton" type="submit" class="primary-button full">调用接口</button>
          </form>
        </section>

        <aside class="panel side-panel">
          <div class="side-title">
            <h2>返回结果</h2>
            <button id="refreshTasks" class="ghost-button" type="button">刷新任务</button>
          </div>
          <div id="loadingPanel" class="loading-panel hidden">
            <div class="loading-spinner"></div>
            <div>
              <strong id="loadingTitle">接口调用中</strong>
              <p id="loadingText">正在等待模型返回结果，请稍候...</p>
            </div>
          </div>
          <div id="resultBox" class="result-box">调用接口后，这里会展示返回内容。</div>
          <div id="assetGallery" class="asset-gallery"></div>
          <h3>最近任务</h3>
          <div id="taskList" class="task-list"></div>
        </aside>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
